<script>
        function openEmotion(label, bgColor, altText) {
            const modal = document.getElementById('emotionModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');
            const img = document.getElementById('modalImage');

            // Set content
            title.textContent = label;
            img.setAttribute('data-alt', altText);
            
            // Clean classes and apply dynamic ones
            content.className = `relative w-full max-w-md ${bgColor} rounded-2xl p-6 border-4 border-on-surface shadow-2xl flex flex-col items-center gap-stack-md transform scale-90 opacity-0 transition-all duration-300`;
            
            // Show modal
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-90', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeEmotion() {
            const modal = document.getElementById('emotionModal');
            const content = document.getElementById('modalContent');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-90', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Add haptic feedback simulation on interactions
        document.querySelectorAll('button, .emotion-card').forEach(el => {
            el.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(50);
                }
            });
        });
    </script>
