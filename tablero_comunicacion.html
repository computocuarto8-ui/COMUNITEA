    <div class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-error text-on-error px-4 py-2 rounded-xl font-body-md shadow-lg" id="tts-warning">Audio no disponible en este dispositivo</div>
    <script>
        var audioUnlocked = false;
        var ttsAvailable = false;

        function unlockAudio() {
            if (audioUnlocked) return;
            audioUnlocked = true;
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();
                var buf = ctx.createBuffer(1, 1, 22050);
                var src = ctx.createBufferSource();
                src.buffer = buf;
                src.connect(ctx.destination);
                src.start(0);
                if (ctx.state === 'suspended') ctx.resume();
                ctx.close();
            } catch(e) {}
            checkTTS();
        }

        function checkTTS() {
            if (typeof speechSynthesis === 'undefined') {
                showTTSWarning();
                return;
            }
            ttsAvailable = true;
            try {
                if (speechSynthesis.getVoices().length > 0) return;
                speechSynthesis.addEventListener('voiceschanged', function() {
                    try { if (speechSynthesis.getVoices().length > 0) ttsAvailable = true; } catch(e) {}
                }, { once: true });
                setTimeout(function() {
                    try {
                        if (speechSynthesis.getVoices().length === 0) {
                            showTTSWarning();
                        }
                    } catch(e) {}
                }, 3000);
            } catch(e) {
                showTTSWarning();
            }
        }

        function showTTSWarning() {
            var warn = document.getElementById('tts-warning');
            if (warn) {
                warn.classList.remove('hidden');
                setTimeout(function() { warn.classList.add('hidden'); }, 5000);
            }
        }

        function speakText(text) {
            if (!text) return;
            if (typeof speechSynthesis !== 'undefined') {
                try {
                    speechSynthesis.cancel();
                    var utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'es-ES';
                    utterance.rate = 1.0;
                    speechSynthesis.speak(utterance);
                } catch(e) {
                    showTTSWarning();
                }
            }
            if ('vibrate' in navigator) {
                navigator.vibrate(30);
            }
        }

        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('click', unlockAudio, { once: true });
        document.addEventListener('pointerdown', unlockAudio, { once: true });

        const textInput = document.getElementById('text-input');

        textInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                speakSentence();
            }
        });

        function addToSentence(label) {
            const current = textInput.value.trim();
            textInput.value = current ? current + ' ' + label : label;
            speakText(label);
            if ('vibrate' in navigator) {
                navigator.vibrate(50);
            }
        }

        function clearSentence() {
            textInput.value = textInput.value.slice(0, -1);
            textInput.focus();
        }

        let deleteInterval;
        const deleteBtn = document.getElementById('delete-btn');

        function startDelete() {
            clearSentence();
            deleteInterval = setInterval(clearSentence, 80);
        }

        function stopDelete() {
            clearInterval(deleteInterval);
        }

        deleteBtn.addEventListener('mousedown', startDelete);
        deleteBtn.addEventListener('mouseup', stopDelete);
        deleteBtn.addEventListener('mouseleave', stopDelete);
        deleteBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            startDelete();
        });
        deleteBtn.addEventListener('touchend', stopDelete);
        deleteBtn.addEventListener('touchcancel', stopDelete);

        function speakSentence() {
            const text = textInput.value.trim();
            speakText(text);
        }
    </script>
