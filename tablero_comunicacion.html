<style>

<body class="font-body-md text-on-background min-h-screen flex flex-col pb-24">
<!-- TopAppBar Shell -->
<header class="bg-surface dark:bg-surface-dim flex justify-between items-center w-full px-container-padding py-4 border-b-2 border-surface-variant dark:border-outline-variant sticky top-0 z-40">
<div class="flex items-center gap-4">
<button class="hover:bg-surface-container-high transition-colors p-2 rounded-full active:translate-y-0.5 transition-transform">

</div>

</button>
</header>
<main class="flex-1 px-container-padding py-stack-md max-w-4xl mx-auto w-full">
<!-- Sentence Bar (Predictive/Building area) -->
<section class="mb-stack-lg">
<div class="w-full min-h-[100px] bg-white border-2 border-outline-variant rounded-xl p-4 flex items-center gap-3 overflow-x-auto sentence-bar-glow mb-4 relative" id="sentence-bar">
<!-- Placeholder when empty -->
<div class="absolute inset-0 flex items-center justify-center text-on-surface-variant opacity-50 pointer-events-none" id="empty-state">
<p class="font-body-lg text-body-lg italic">Toca para hablar...</p>
</div>
</div>
<div class="flex gap-stack-sm">
<button class="flex-1 h-14 bg-surface-container-highest border-2 border-outline-variant rounded-xl font-label-caps text-label-caps text-on-surface-variant flex items-center justify-center gap-2 active:translate-y-1 transition-all" onclick="clearSentence()">
<span class="material-symbols-outlined">backspace</span>
                    BORRAR TODO
                </button>
<button class="flex-1 h-14 bg-primary border-2 border-primary-fixed-variant rounded-xl font-label-caps text-label-caps text-on-primary flex items-center justify-center gap-2 active:translate-y-1 transition-all shadow-md" onclick="speakSentence()">
<span class="material-symbols-outlined">volume_up</span>
                    REPRODUCIR
                </button>
</div>
</section>
<!-- Communication Grid -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-gutter">
<!-- Water / Agua (Needs Category - Blue) -->
<button class="pictogram-card aspect-square bg-primary-container border-2 border-on-primary-fixed-variant rounded-xl flex flex-col items-center justify-center p-4" onclick="addToSentence('Agua', 'water_full', 'bg-primary-container', 'text-on-primary-container')">
<span class="material-symbols-outlined text-6xl text-on-primary-container mb-2">water_full</span>
<span class="font-headline-md text-headline-md text-on-primary-container uppercase tracking-wide">AGUA</span>
</button>
<!-- Eat / Comer (Needs Category - Green) -->
<button class="pictogram-card aspect-square bg-secondary-container border-2 border-on-secondary-fixed-variant rounded-xl flex flex-col items-center justify-center p-4" onclick="addToSentence('Comer', 'restaurant', 'bg-secondary-container', 'text-on-secondary-container')">
<span class="material-symbols-outlined text-6xl text-on-secondary-container mb-2">restaurant</span>
<span class="font-headline-md text-headline-md text-on-secondary-container uppercase tracking-wide">COMER</span>
</button>
<!-- Toilet / Baño (Hygiene Category - Yellow/Amber) -->
<button class="pictogram-card aspect-square bg-tertiary-container border-2 border-on-tertiary-fixed-variant rounded-xl flex flex-col items-center justify-center p-4" onclick="addToSentence('Baño', 'wc', 'bg-tertiary-container', 'text-on-tertiary-container')">
<span class="material-symbols-outlined text-6xl text-on-tertiary-container mb-2">wc</span>
<span class="font-headline-md text-headline-md text-on-tertiary-container uppercase tracking-wide">BAÑO</span>

</button>

<script>
        const sentenceBar = document.getElementById('sentence-bar');
        const emptyState = document.getElementById('empty-state');
        let words = [];

        function addToSentence(label, icon, bgColor, textColor) {
            words.push(label);
            emptyState.style.display = 'none';

            const wordTag = document.createElement('div');
            wordTag.className = `animate-pop flex flex-col items-center justify-center min-w-[70px] h-[70px] ${bgColor} border border-outline-variant rounded-lg p-1 shrink-0`;
            wordTag.innerHTML = `
                <span class="material-symbols-outlined text-2xl ${textColor}">${icon}</span>
                <span class="text-[10px] font-bold ${textColor} uppercase">${label}</span>
            `;
            
            sentenceBar.appendChild(wordTag);
            
            // Auto scroll to end
            sentenceBar.scrollTo({
                left: sentenceBar.scrollWidth,
                behavior: 'smooth'
            });

            // Feedback sound or haptic would go here
            if ('vibrate' in navigator) {
                navigator.vibrate(50);
            }
        }

        function clearSentence() {
            sentenceBar.innerHTML = '';
            sentenceBar.appendChild(emptyState);
            emptyState.style.display = 'flex';
            words = [];
        }

        function speakSentence() {
            if (words.length === 0) return;
            
            const textToSpeak = words.join(' ');
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9; // Slightly slower for clarity
            speechSynthesis.speak(utterance);

            // Pulse effect on play
            const bar = document.getElementById('sentence-bar');
            bar.classList.add('ring-4', 'ring-primary-container');
            setTimeout(() => {
                bar.classList.remove('ring-4', 'ring-primary-container');
            }, 500);
        }
    </script>
